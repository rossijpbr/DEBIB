<script>

/* ================= JS ORIGINAL COMPLETO ================= */

let zoom = 1;

function alterarZoom(delta){
    zoom += delta * 0.1;
    if(zoom < 0.8) zoom = 0.8;
    if(zoom > 1.6) zoom = 1.6;
    document.documentElement.style.fontSize = (14 * zoom) + "px";
}

const mesEl = document.getElementById("mes");
const anoEl = document.getElementById("ano");
const numSalasEl = document.getElementById("numSalas");
const imprimirRegrasEl = document.getElementById("imprimirRegras");
const calendarioEl = document.getElementById("calendario");
const containerEl = document.getElementById("container");
const btnLimpar = document.getElementById("btnLimpar");
const btnGerarAgenda = document.getElementById("btnGerarAgenda");
const holidayListEl = document.getElementById("holidayList");

let eventos = {};
let cacheFeriados = {};
let dragging = false;
let dragAction = null;

const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
               "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

meses.forEach((m,i)=>{
    let op=document.createElement("option");
    op.value=i;
    op.text=m;
    mesEl.appendChild(op);
});

window.onload = () => {
    const hoje = new Date();
    mesEl.value = hoje.getMonth();
    anoEl.value = hoje.getFullYear();
    numSalasEl.value = 7;
    atualizar();
};

mesEl.onchange = atualizar;
anoEl.oninput = atualizar;
numSalasEl.oninput = () => {
    if(numSalasEl.value < 1) numSalasEl.value = 1;
    if(numSalasEl.value > 20) numSalasEl.value = 20;
};
btnLimpar.onclick = limparSelecao;
btnGerarAgenda.onclick = iniciarGeracao;
btnLimpar.disabled = true;

document.body.onmouseup = () => { dragging = false; dragAction = null; };
document.body.onpointerup = document.body.onmouseup;
document.body.ontouchend = document.body.onmouseup;

function getMesAno(){
    return {
        mes: parseInt(mesEl.value),
        ano: parseInt(anoEl.value)
    };
}

function formatarData(d){
    let y = d.getFullYear();
    let m = String(d.getMonth()+1).padStart(2,'0');
    let day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
}

function calcularPascoa(ano){
    let a=ano%19,b=Math.floor(ano/100),c=ano%100;
    let d=Math.floor(b/4),e=b%4;
    let f=Math.floor((b+8)/25);
    let g=Math.floor((b-f+1)/3);
    let h=(19*a+b-d-g+15)%30;
    let i=Math.floor(c/4),k=c%4;
    let l=(32+2*e+2*i-h-k)%7;
    let m=Math.floor((a+11*h+22*l)/451);
    let mes=Math.floor((h+l-7*m+114)/31);
    let dia=((h+l-7*m+114)%31)+1;
    return new Date(ano,mes-1,dia);
}

function obterFeriados(ano){
    if(cacheFeriados[ano]) return cacheFeriados[ano];

    let f = {};
    const pascoa = calcularPascoa(ano);

    function add(d,nome){
        f[formatarData(d)] = nome;
    }

    function addDias(d,x){
        let n=new Date(d);
        n.setDate(n.getDate()+x);
        return n;
    }

    add(new Date(ano,0,1),"Confraternização Universal");
    add(new Date(ano,3,21),"Tiradentes");
    add(new Date(ano,4,1),"Dia do Trabalho");
    add(new Date(ano,8,7),"Independência do Brasil");
    add(new Date(ano,9,12),"Nossa Senhora Aparecida");
    add(new Date(ano,10,2),"Finados");
    add(new Date(ano,10,15),"Proclamação da República");
    add(new Date(ano,11,25),"Natal");

    add(addDias(pascoa,-2),"Sexta-feira Santa");
    add(addDias(pascoa,60),"Corpus Christi");
    add(addDias(pascoa,-47),"Carnaval (Terça-feira)");
    add(addDias(pascoa,-48),"Carnaval (Segunda-feira)");

    cacheFeriados[ano] = f;
    return f;
}

function atualizar(){
    gerarCalendario();
    gerarAgenda();
    atualizarBotaoLimpar();
    renderHolidayList();
}

function atualizarBotaoLimpar(){
    const temFechado = Object.values(eventos).some(ev => ev.nome === "Biblioteca fechada");
    btnLimpar.disabled = !temFechado;
}

function renderHolidayList(){
    const {mes, ano} = getMesAno();
    const feriados = obterFeriados(ano);
    const items = Object.keys(feriados)
        .filter(data => Number(data.split("-")[1]) - 1 === mes)
        .sort((a,b)=>a.localeCompare(b))
        .map(data => {
            const [y,m,d] = data.split("-");
            return `<li>${parseInt(d)}/${parseInt(m)} - ${feriados[data]}</li>`;
        });
    holidayListEl.innerHTML = items.length ? `<ul>${items.join("")}</ul>` : "";
}

function getNumSalas(){
    const value = parseInt(numSalasEl.value, 10);
    return isNaN(value) ? 7 : Math.min(20, Math.max(1, value));
}

function iniciarGeracao(){
    const loader = document.getElementById("loaderOverlay");
    const fill = document.querySelector(".loader-fill");
    loader.classList.remove("hidden");
    fill.style.width = "0%";

    let progress = 0;
    const step = 100 / 18;
    const interval = setInterval(() => {
        progress += step;
        if(progress > 100) progress = 100;
        fill.style.width = progress + "%";
        if(progress >= 100){
            clearInterval(interval);
            setTimeout(() => {
                loader.classList.add("hidden");
                window.print();
            }, 150);
        }
    }, 100);
}

function gerarCalendario(){

    calendarioEl.innerHTML = "";

    const {mes, ano} = getMesAno();

    const diasSemana=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

    diasSemana.forEach(d=>{
        let div=document.createElement("div");
        div.className="dia-semana";
        div.innerText=d;
        calendarioEl.appendChild(div);
    });

    const primeiro = new Date(ano,mes,1).getDay();
    const diasMes = new Date(ano,mes+1,0).getDate();
    const feriados = obterFeriados(ano);

    for(let i=0;i<primeiro;i++){
        calendarioEl.appendChild(document.createElement("div"));
    }

    for(let dia=1;dia<=diasMes;dia++){

        const data = new Date(ano,mes,dia);
        const chave = formatarData(data);
        const diaSemana = data.getDay();

        let div=document.createElement("div");
        div.className="dia-cal";
        div.innerText=dia;

        const isFeriado = !!feriados[chave];
        const isFechado = eventos[chave] && eventos[chave].nome === "Biblioteca fechada";

        if(diaSemana===0 || diaSemana===6){
            if(!isFeriado) div.classList.add("dia-fds");
        }

        if(isFechado){
            div.classList.add("dia-fechado");
            div.title = "Biblioteca fechada";
        } else if(isFeriado){
            div.classList.add("dia-feriado");
            div.title = feriados[chave];
        }

        const atualizarDia = () => {
            const estaFechado = eventos[chave] && eventos[chave].nome === "Biblioteca fechada";
            if(estaFechado){
                div.classList.add("dia-fechado", "dia-selecionado");
                div.classList.remove("dia-feriado", "dia-fds");
                div.title = "Biblioteca fechada";
            } else if(isFeriado){
                div.classList.remove("dia-fechado", "dia-selecionado", "dia-fds");
                div.classList.add("dia-feriado");
                div.title = feriados[chave];
            } else if(diaSemana === 0 || diaSemana === 6){
                div.classList.remove("dia-fechado", "dia-feriado", "dia-selecionado");
                div.classList.add("dia-fds");
                div.title = "";
            } else {
                div.classList.remove("dia-fechado", "dia-feriado", "dia-selecionado", "dia-fds");
                div.title = "";
            }
        };

        const atualizarEstado = () => {
            atualizarDia();
            atualizarBotaoLimpar();
            gerarAgenda();
        };

        const alternarDia = (e) => {
            if(isFeriado) return;
            if(e) e.preventDefault();
            dragging = true;
            const estaFechado = eventos[chave] && eventos[chave].nome === "Biblioteca fechada";
            dragAction = estaFechado ? 'remove' : 'add';
            if(estaFechado){
                delete eventos[chave];
            } else {
                eventos[chave] = { nome: "Biblioteca fechada" };
            }
            atualizarEstado();
        };

        if(window.PointerEvent){
            div.onpointerdown = alternarDia;
        } else {
            div.onmousedown = alternarDia;
            div.ontouchstart = alternarDia;
        }

        div.onmouseenter = () => {
            if(!dragging || isFeriado) return;
            const estaFechado = eventos[chave] && eventos[chave].nome === "Biblioteca fechada";
            if(dragAction === 'add' && !estaFechado){
                eventos[chave] = { nome: "Biblioteca fechada" };
                atualizarEstado();
            }
            if(dragAction === 'remove' && estaFechado){
                delete eventos[chave];
                atualizarEstado();
            }
        };

        if(window.PointerEvent){
            div.onpointerenter = div.onmouseenter;
        }

        div.onclick = (e) => {
            if(isFeriado) return;
            e.preventDefault();
        };

        calendarioEl.appendChild(div);
    }
}

function limparSelecao(){
    Object.keys(eventos).forEach(chave => {
        if(eventos[chave].nome === "Biblioteca fechada"){
            delete eventos[chave];
        }
    });
    atualizar();
}

function gerarAgenda(){
    containerEl.innerHTML="";

    const {mes, ano} = getMesAno();

    const diasMes=new Date(ano,mes+1,0).getDate();
    const metade=Math.ceil(diasMes/2);

    if(imprimirRegrasEl.checked){
        criarPaginaRegras(containerEl);
    }
    criarCapaMes(mes,containerEl);
    criarPagina(1,mes,ano,containerEl,1,metade);
    criarPagina(1,mes,ano,containerEl,metade+1,diasMes);
}

window.onbeforeprint=function(){

    const {mes, ano} = getMesAno();

    containerEl.innerHTML="";

    const diasMes=new Date(ano,mes+1,0).getDate();
    const metade=Math.ceil(diasMes/2);
    const numSalas = getNumSalas();

    if(imprimirRegrasEl.checked){
        criarPaginaRegras(containerEl);
    }
    criarCapaMes(mes,containerEl);

    for(let sala=1;sala<=numSalas;sala++){
        criarPagina(sala,mes,ano,containerEl,1,metade);
        criarPagina(sala,mes,ano,containerEl,metade+1,diasMes);
    }
};

function criarCapaMes(mes,cont){
    let div=document.createElement("div");
    div.className="page month-cover";

    let titulo=document.createElement("h2");
    titulo.className="month-cover-title";
    titulo.textContent=meses[mes].toLocaleUpperCase("pt-BR");
    if(titulo.textContent.length >= 9){
        titulo.classList.add("month-extra-long");
    } else if(titulo.textContent.length >= 7){
        titulo.classList.add("month-long");
    }

    div.appendChild(titulo);
    cont.appendChild(div);
}

function criarPagina(sala,mes,ano,cont,inicio,fim){

    const feriados = obterFeriados(ano);

    let div=document.createElement("div");
    div.className="page";

    let side=document.createElement("div");
    side.className="sidebar";
    side.innerHTML=`<span>SALA ${sala} - ${meses[mes]} / ${ano}</span>`;
    div.appendChild(side);

    let tabela=document.createElement("table");

    let header="<tr><th>Dia</th>";
    for(let h=8;h<22;h++){
        header+=`<th>${h}h-${h+1}h</th>`;
    }
    header+="</tr>";
    tabela.innerHTML=header;

    const ALTURA_UTIL_MM = 185;
    const ALTURA_CABECALHO_MM = 5;
    const ALTURA_LINHA_COMPACTA_MM = 8;

    let linhasCompactas = 0;
    let linhasNormais = 0;
    for(let dia=inicio;dia<=fim;dia++){
        const data=new Date(ano,mes,dia);
        const semana=data.getDay();
        const chave=formatarData(data);
        if(eventos[chave] || feriados[chave] || semana===0 || semana===6){
            linhasCompactas++;
        } else {
            linhasNormais++;
        }
    }

    const alturaDisponivel = ALTURA_UTIL_MM - ALTURA_CABECALHO_MM;
    const alturaUsadaCompactas = linhasCompactas * ALTURA_LINHA_COMPACTA_MM;
    const alturaLinhaNormal = linhasNormais
        ? (alturaDisponivel - alturaUsadaCompactas) / linhasNormais
        : ALTURA_LINHA_COMPACTA_MM;

    for(let dia=inicio;dia<=fim;dia++){

        let tr=document.createElement("tr");

        const data=new Date(ano,mes,dia);
        const semana=data.getDay();
        const chave=formatarData(data);

        let texto="";
        let linhaCompacta = false;

        if(eventos[chave]){
            tr.classList.add("holiday","special");
            linhaCompacta = true;
            texto=eventos[chave].nome === "Biblioteca fechada"
                ? "Biblioteca&#10;fechada"
                : eventos[chave].nome;
        }
        else if(feriados[chave]){
            tr.classList.add("holiday","special");
            linhaCompacta = true;
            texto="Biblioteca&#10;Fechada";
        }
        else if(semana===0||semana===6){
            tr.classList.add("weekend","special");
            linhaCompacta = true;
            texto=nomeDiaSemana(semana);
        }

        let linha=`<td>${dia}</td>`;

        for(let h=8;h<22;h++){
            linha+=`<td contenteditable="true" ${texto?`data-dia="${texto}"`:''}></td>`;
        }

        tr.innerHTML=linha;
        tr.style.height=(linhaCompacta ? ALTURA_LINHA_COMPACTA_MM : alturaLinhaNormal)+"mm";

        tabela.appendChild(tr);
    }

    div.appendChild(tabela);
    cont.appendChild(div);
}

function nomeDiaSemana(d){
    return ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"][d];
}
